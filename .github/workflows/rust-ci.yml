name: Rust CI

on:
  push:
    paths:
      - 'libraries/rust/**'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    paths:
      - 'libraries/rust/**'
      - '.github/workflows/rust-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libraries/rust
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          
      - name: Build
        run: cargo build --verbose
        
      - name: Run tests
        run: cargo test --verbose

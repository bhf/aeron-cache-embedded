name: Java CI

on:
  push:
    paths:
      - 'libraries/java/**'
      - '.github/workflows/java-ci.yml'
  pull_request:
    paths:
      - 'libraries/java/**'
      - '.github/workflows/java-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libraries/java
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Build and test
        run: ./gradlew build

name: Java CI

on:
  push:
    paths:
      - 'libraries/java/**'
      - '.github/workflows/java-ci.yml'
  pull_request:
    paths:
      - 'libraries/java/**'
      - '.github/workflows/java-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libraries/java
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Homebrew
        run: |
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
      
      - name: Install Aeron Cache Backend
        run: |
          brew tap bhf/aeroncache
          brew install aeron-cache

      - name: Start Aeron Cache Backend
        run: |
          nohup aeron-cache > aeron-cache-log.txt 2>&1 &
          ENV_FILE="$HOME/.aeron-cache/aeron-cache-ui.env"
          
          for i in {1..30}; do
            if [ -f "$ENV_FILE" ]; then
              echo "Environment file found"
              break
            fi
            echo "Waiting for $ENV_FILE..."
            sleep 1
          done
          
          if [ -f "$ENV_FILE" ]; then
            API_URL=$(grep AERON_CACHE_API "$ENV_FILE" | cut -d'=' -f2)
            if [[ "$API_URL" != */cache ]]; then
              API_URL="${API_URL%/}/cache"
            fi
            echo "Found API URL: $API_URL"
            echo "AERON_CACHE_API_URL=$API_URL" >> $GITHUB_ENV
            
            WS_URL=$(echo "$API_URL" | sed 's/^http/ws/')
            echo "AERON_CACHE_WS_URL=$WS_URL" >> $GITHUB_ENV
          else
            echo "Error: $ENV_FILE not found after timeout"
            exit 1
          fi
          
      - name: Build and test
        run: ./gradlew build
